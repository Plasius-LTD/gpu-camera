<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>gpu-camera demo</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main>
      <h1>@plasius/gpu-camera demo</h1>
      <p>
        Demonstrates multi-camera registration, fast switching, and parallel
        multiview render planning.
      </p>

      <section class="display-state" aria-live="polite">
        <h2>Display State</h2>
        <p id="displayBadge" class="display-badge">State-only demo</p>
        <p id="displayDetails" class="display-details">
          No 3D canvas is mounted in this demo by design.
        </p>
      </section>

      <div class="controls">
        <button id="switch">Switch Camera</button>
        <button id="multiview">Create Multiview Plan</button>
      </div>

      <pre id="output"></pre>
    </main>

    <script type="module" src="./main.js"></script>
  </body>
</html>
